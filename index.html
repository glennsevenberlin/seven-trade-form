<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Stock Movement</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #333; background: #f5f5f5; padding: 20px; }
  .card { background: #fff; border-radius: 10px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #111; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 0; }
  .version { font-size: 11px; color: #ccc; text-align: right; margin-top: 8px; }
  label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 13px; color: #555; }
  select, input[type="text"], input[type="number"], input[type="password"] {
    width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 14px; color: #333; background: #fff; appearance: none;
  }
  select:focus, input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.1); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { margin-bottom: 0; }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 10px; border-bottom: 1px solid #eee; }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  tbody td { padding: 8px 6px; vertical-align: middle; }
  tbody td select, tbody td input { margin: 0; }
  .btn-add { background: none; border: 1px dashed #bbb; border-radius: 6px; color: #888; padding: 8px 16px; cursor: pointer; font-size: 13px; width: 100%; margin-top: 12px; transition: all 0.15s; }
  .btn-add:hover { border-color: #7c3aed; color: #7c3aed; background: #faf5ff; }
  .btn-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0 6px; line-height: 1; transition: color 0.15s; }
  .btn-remove:hover { color: #e53e3e; }
  .btn-submit { background: #7c3aed; color: #fff; border: none; border-radius: 8px; padding: 12px 32px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.15s; }
  .btn-submit:hover:not(:disabled) { background: #6d28d9; }
  .btn-submit:disabled { background: #bbb; cursor: not-allowed; }
  .status { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 12px; display: none; word-break: break-all; }
  .status.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: block; }
  .status.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
  .status.loading { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; display: block; }
  .invoice-col { display: none; }
  .invoice-col.visible { display: table-cell; }
  .qty-col { width: 90px; }
  .remove-col { width: 40px; }
  .load-btn { background: #7c3aed; color: #fff; border: none; border-radius: 6px; padding: 8px 20px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 10px; }
  .load-btn:hover { background: #6d28d9; }
</style>
</head>
<body>

<div class="card">
  <h1>Trade Stock Movement</h1>
  <p class="subtitle">Enter stock movements for trade clients</p>
  <p class="version">v1.5</p>
</div>

<div class="card">
  <div class="form-group">
    <label>Airtable API Token</label>
    <input type="password" id="apiToken" placeholder="Paste your personal access token here">
  </div>
  <button class="load-btn" onclick="loadData()">Load data</button>
  <div class="status" id="loadStatus"></div>
</div>

<div class="card">
  <div class="row">
    <div class="form-group">
      <label>Staff name</label>
      <select id="staffName">
        <option value="">— Select staff —</option>
        <option value="Philippe">Philippe</option>
        <option value="Jonny">Jonny</option>
        <option value="Glenn">Glenn</option>
        <option value="CRYME">CRYME</option>
        <option value="Rachel">Rachel</option>
      </select>
    </div>
    <div class="form-group">
      <label>Reason for movement</label>
      <input type="text" id="reasonForMovement" placeholder="e.g. New consignment, quarterly update">
    </div>
  </div>
</div>

<div class="card">
  <div class="row">
    <div class="form-group">
      <label>Client</label>
      <select id="clientSelect">
        <option value="">— Select client —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Transaction type</label>
      <select id="txnType" onchange="handleTxnTypeChange()">
        <option value="">— Select type —</option>
        <option value="Shipped">Shipped</option>
        <option value="Sold">Sold</option>
        <option value="Invoiced">Invoiced</option>
      </select>
    </div>
  </div>
</div>

<div class="card">
  <table id="productTable">
    <thead>
      <tr>
        <th>Product</th>
        <th class="qty-col">Quantity</th>
        <th class="invoice-col" id="invoiceHeader">Invoice number</th>
        <th class="remove-col"></th>
      </tr>
    </thead>
    <tbody id="productRows">
    </tbody>
  </table>
  <button class="btn-add" onclick="addRow()">+ Add product</button>
</div>

<div class="card">
  <button class="btn-submit" id="submitBtn" onclick="submitForm()">Submit</button>
  <div class="status" id="statusMsg"></div>
</div>

<script>
const BASE_ID = 'appKSv3xAO9AHTN6g';
const TXN_TABLE_ID = 'tblrPpiv1u5B8Ag3c';

let clients = [];
let products = [];

function getToken() {
  return document.getElementById('apiToken').value.trim();
}

function showLoadStatus(type, msg) {
  const el = document.getElementById('loadStatus');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function showStatus(type, msg) {
  const el = document.getElementById('statusMsg');
  el.className = 'status ' + type;
  el.textContent = msg;
}

async function apiCall(url, options = {}) {
  const token = getToken();
  const res = await fetch(url, {
    method: options.method || 'GET',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: options.body || undefined
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Airtable API error');
  }
  return res.json();
}

async function loadData() {
  const token = getToken();
  if (!token) { showLoadStatus('error', 'Please paste your API token first.'); return; }

  showLoadStatus('loading', 'Loading clients and products...');

  try {
    const clientData = await apiCall(
      'https://api.airtable.com/v0/' + BASE_ID + '/Trade%20Clients?fields[]=Trade%20Account&sort[0][field]=Trade%20Account'
    );
    clients = clientData.records;
    const sel = document.getElementById('clientSelect');
    sel.innerHTML = '<option value="">— Select client —</option>';
    clients.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.fields['Trade Account'];
      sel.appendChild(opt);
    });

    let allProducts = [];
    let offset = null;
    do {
      let url = 'https://api.airtable.com/v0/' + BASE_ID + '/Products?fields[]=SKU&fields[]=Name&fields[]=Sales%20Channels&sort[0][field]=SKU';
      if (offset) url += '&offset=' + offset;
      const data = await apiCall(url);
      allProducts = allProducts.concat(data.records);
      offset = data.offset;
    } while (offset);

    products = allProducts.filter(p => {
      const ch = p.fields['Sales Channels'];
      if (!ch) return false;
      return Array.isArray(ch) ? ch.includes('Direct Trade') : ch === 'Direct Trade';
    });

    refreshProductDropdowns();
    showLoadStatus('success', '✓ Loaded ' + clients.length + ' clients and ' + products.length + ' products.');

  } catch(e) {
    showLoadStatus('error', 'Error loading data: ' + e.message);
  }
}

function refreshProductDropdowns() {
  document.querySelectorAll('.product-select').forEach(sel => {
    const current = sel.value;
    sel.innerHTML = '<option value="">— Select product —</option>';
    products.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.fields.SKU + (p.fields.Name ? ' — ' + p.fields.Name : '');
      sel.appendChild(opt);
    });
    if (current) sel.value = current;
  });
}

function addRow() {
  const tbody = document.getElementById('productRows');
  const txnType = document.getElementById('txnType').value;
  const showInvoice = txnType === 'Invoiced';
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><select class="product-select"><option value="">— Select product —</option></select></td>
    <td class="qty-col"><input type="number" class="qty-input" min="1" placeholder="0"></td>
    <td class="invoice-col${showInvoice ? ' visible' : ''}"><input type="text" class="invoice-input" placeholder="Invoice #"></td>
    <td class="remove-col"><button class="btn-remove" onclick="removeRow(this)">×</button></td>
  `;
  tbody.appendChild(tr);
  refreshProductDropdowns();
}

function removeRow(btn) {
  btn.closest('tr').remove();
}

function handleTxnTypeChange() {
  const txnType = document.getElementById('txnType').value;
  const showInvoice = txnType === 'Invoiced';
  document.getElementById('invoiceHeader').classList.toggle('visible', showInvoice);
  document.querySelectorAll('.invoice-col').forEach(el => {
    el.classList.toggle('visible', showInvoice);
  });
}

async function submitForm() {
  const token = getToken();
  if (!token) { showStatus('error', 'Please enter your API token.'); return; }

  const clientId = document.getElementById('clientSelect').value;
  const txnType = document.getElementById('txnType').value;

  if (!clientId) { showStatus('error', 'Please select a client.'); return; }
  if (!txnType) { showStatus('error', 'Please select a transaction type.'); return; }

  const rows = document.querySelectorAll('#productRows tr');
  if (rows.length === 0) { showStatus('error', 'Please add at least one product.'); return; }

  const records = [];
  let valid = true;

  rows.forEach((row) => {
    const productSel = row.querySelector('.product-select');
    const productId = productSel.value;
    const qty = parseInt(row.querySelector('.qty-input').value);
    const invoiceInput = row.querySelector('.invoice-input');
    const invoiceNum = invoiceInput ? invoiceInput.value.trim() : '';

    if (!productId || !qty || qty < 1) { valid = false; return; }

    const fields = {
      'Client': [clientId],
      'Product': [productId],
      'Txn type': txnType,
      'Quantity': qty
    };

    if (txnType === 'Invoiced' && invoiceNum) {
      fields['Invoice number'] = invoiceNum;
    }

    records.push({ fields });
  });

  if (!valid) { showStatus('error', 'Please make sure all rows have a product and a valid quantity.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  showStatus('loading', 'Submitting ' + records.length + ' record(s)...');

  try {
    for (let i = 0; i < records.length; i += 10) {
      const batch = records.slice(i, i + 10);
      const body = JSON.stringify({ records: batch });
      await apiCall(
        'https://api.airtable.com/v0/' + BASE_ID + '/' + TXN_TABLE_ID,
        { method: 'POST', body: body }
      );
    }
    showStatus('success', '✓ ' + records.length + ' transaction(s) created successfully.');

    // Write audit log entry
    const staffName = document.getElementById('staffName').value.trim() || 'Unknown';
    const reason = document.getElementById('reasonForMovement').value.trim() || 'No reason given';
    const clientName = document.getElementById('clientSelect').options[document.getElementById('clientSelect').selectedIndex].text;
    const auditNote = staffName + ' created ' + txnType + ' stock movement for ' + clientName + ' — ' + reason;
    await apiCall(
      'https://api.airtable.com/v0/' + BASE_ID + '/Audit%20Trail',
      {
        method: 'POST',
        body: JSON.stringify({
          records: [{
            fields: {
              'System': 'Trade Stock Sys',
              'Status': 'Success',
              'Notes': auditNote,
              'Client': [clientId]
            }
          }]
        })
      }
    );

    document.getElementById('productRows').innerHTML = '';
    document.getElementById('clientSelect').value = '';
    document.getElementById('txnType').value = '';
    document.getElementById('staffName').value = '';
    document.getElementById('reasonForMovement').value = '';
    addRow();
  } catch(e) {
    showStatus('error', 'Error: ' + e.message + ' | Payload: ' + JSON.stringify({ records: records }));
  } finally {
    btn.disabled = false;
  }
}

addRow();
</script>
</body>
</html>
